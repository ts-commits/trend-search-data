name: Build search data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/build-search-json.js'
      - '.github/workflows/build-search-data.yml'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build JSON and SEO HTML from Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEET_NAME: resources
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/search-data.json docs/.nojekyll docs/seo
          git diff --cached --quiet && exit 0
          git commit -m "Build search-data and seo html"
          git pull --rebase origin main
          git push origin main
